version: "3"

vars:
  BINARY: pta2svg

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  vet:
    desc: Vet Go code
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  check:
    desc: Format, vet, and test
    cmds:
      - task: fmt
      - task: vet
      - task: test

  build:
    desc: Build binary
    cmds:
      - go build -o {{.BINARY}} ./cmd/pta2svg

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}}

  deps:tidy:
    desc: Tidy module dependencies
    cmds:
      - go mod tidy

  release:
    desc: Tag and push a release
    preconditions:
      - sh: '[ -n "{{.VERSION}}" ]'
        msg: "VERSION is required (e.g. task release VERSION=v0.1.0 COMMENT='initial')"
      - sh: 'echo "{{.VERSION}}" | grep -q "^v"'
        msg: "VERSION must start with v"
    cmds:
      - task: check
      - git tag -a {{.VERSION}} -m "{{.COMMENT}}"
      - git push origin {{.VERSION}}
